name: Publish to npm

# Publica no npm ao criar uma Release no GitHub, ou manualmente pelo botão
# "Run workflow" na aba Actions (workflow_dispatch).
# Pré-requisito: secret NPM_TOKEN (Automation token) no repositório.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # habilita provenance (cadeia de origem verificável)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm run build
      # Valida o NPM_TOKEN sem publicar: imprime o usuário npm se o token
      # autenticar; falha aqui (e aborta o publish) se estiver errado/ausente.
      - name: Validar NPM_TOKEN (whoami)
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
