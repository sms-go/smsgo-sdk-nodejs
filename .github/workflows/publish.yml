name: Publish to npm

# Publica no npm ao criar uma Release no GitHub, ou manualmente pelo botão
# "Run workflow" na aba Actions (workflow_dispatch).
# Pré-requisito: secret NPM_TOKEN (Automation token) no repositório.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # habilita provenance (cadeia de origem verificável)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm run build
      # Se a versão do package.json já está no npm (ex.: Release retroativo ou
      # re-run), pula o publish e encerra verde — o npm é imutável por versão.
      - name: Versão já publicada?
        id: check
        # NODE_AUTH_TOKEN é necessário aqui: o setup-node grava um .npmrc com o
        # placeholder ${NODE_AUTH_TOKEN}; sem a env, QUALQUER comando npm falha ao
        # resolver o placeholder (não por a versão faltar). É só leitura pública.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@orynlabs/smsgo@$VERSION" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@orynlabs/smsgo@$VERSION já está no npm — pulando publish."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi
      # Valida o NPM_TOKEN sem publicar: imprime o usuário npm se o token
      # autenticar; falha aqui (e aborta o publish) se estiver errado/ausente.
      - name: Validar NPM_TOKEN (whoami)
        if: steps.check.outputs.already == 'false'
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publicar no npm
        if: steps.check.outputs.already == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
