name: Publish to npm

# Publica no npm quando você cria uma Release no GitHub.
# Pré-requisito: secret NPM_TOKEN (Automation token) no repositório.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # habilita provenance (cadeia de origem verificável)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
